<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Início</title>

    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/signIn.css">
</head>

<body>

<header>
    <nav>
        <img class="logo" src="../assets/icons/globe.png" alt="Logo">
        <span class="site-name">WorldGuide</span>
    </nav>
</header>

<main class="login-page">

    <section class="left-side">

        <img class="hero-bkg" src="../assets/background/imSignUp.jpg" alt="Fundo">

        <img class="hero-mascot" src="../assets/raiMundo/raiVaticano.png" alt="RaiMUNDO">

    </section>

    <section class="right-side">

        <div class="login-container">

            <h1>Login</h1>
            
            <form class="login-form">

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email">

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password">

                <p class="forget">
                    <a href="forgotPassword1.html">Esqueci minha senha.</a>
                </p>

                <button class= "btn-submit" type="submit">Entrar</button>

                <p class="pRegistro">Não tem uma conta?<a href="signUp.html">Registre-se</a></p>

            </form>

            <p class="divider">ou</p>

            <div class="buttons">
                <a href="#" class="btn btn-google"><img src="../assets/icons/google.png" alt="Google"><span>Google</span></a>
                <a href="#" class="btn btn-facebook"><img src="../assets/icons/facebook.png" alt="Facebook"><span>Facebook</span></a>
            </div>
            
        </div>

    </section>

</main>

</body>

</html>
