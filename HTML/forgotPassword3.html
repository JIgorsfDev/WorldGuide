<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recuperar senha</title>

    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/fp3.css">
</head>

<body>

<header>
    <nav>
        <img class="logo" src="../assets/icons/globe.png" alt="Logo">
        <span class="site-name">WorldGuide</span>
    </nav>
</header>

<main class="fp3-page">

    <section class="left-side">

        <img class="hero-bkg" src="../assets/background/imFP3.jpg" alt="Fundo">

        <img class="hero-mascot" src="../assets/raiMundo/raiFrance.png" alt="RaiMUNDO">

    </section>

    <section class="right-side">

        <div class="fp3-container">

            <h1>Recuperar senha</h1>
            
            <form class="fp3-form">

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password">

                <label for="confirm">Confirme a sua Senha:</label>
                <input type="password" id="confirm" name="confirm">

                <button class= "btn btn-submit" type="enviar">Entrar</button>

            </form>
            
        </div>

    </section>

</main>

</body>

</html>
