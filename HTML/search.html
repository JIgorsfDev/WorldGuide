<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pesquisar</title>

    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/search.css">
</head>

<body>

<header>
    <nav>
        <button class="menu-btn">
            <img src="../assets/icons/menu.png" alt="Menu">
        </button>
        <img class="logo" src="../assets/icons/globe.png" alt="Logo">
        <span class="site-name">WorldGuide</span>
    </nav>
</header>

<main class="search">

    <img class="bkg" src="../assets/background/imSearch.jpg" alt="Imagem de fundo">

    <section class="search-section">

        <div class="search-container">

            <img class="mascot" src="../assets/raiMundo/raiSearch.png" alt="RaiMUNDO">

            <div class="search-bar">

                <img class="search-icon" src="../assets/icons/search.png" alt="Pesquisar">

                <input type="text" class="search-input" placeholder="Escolha um país...">

                <button class="cancel-btn" type="button">
                    <img class="cancel-icon" src="../assets/icons/cancel.png" alt="Cancelar">
                </button>

                <img class="filter-icon" src="../assets/icons/filter.png" alt="Filtro">

            </div>

            <div class="recent-searches">

                <p class="recent-title">Recentes</p>

                <div class="recommendations">

                    <div class="country-card">
                        <img class="flag" src="../assets/icons/flag1.png" alt="Bandeira do Brasil">
                        <div class="country-info">
                            <p class="country-name">Afeganistão</p>
                            <p class="continent">Ásia</p>
                        </div>
                    </div>

                    <div class="country-card">
                        <img class="flag" src="../assets/icons/flag2.svg" alt="Bandeira do Japão">
                        <div class="country-info">
                            <p class="country-name">África do sul</p>
                            <p class="continent">África</p>
                        </div>
                    </div>

                    <div class="country-card">
                        <img class="flag" src="../assets/icons/flag3.png" alt="Bandeira da França">
                        <div class="country-info">
                            <p class="country-name">Albânia</p>
                            <p class="continent">Europa</p>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </section>

</main>

</body>

</html>
