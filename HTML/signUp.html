<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro</title>

    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/signUp.css">
</head>

<body>

<header>
    <nav>
        <img class="logo" src="../assets/icons/globe.png" alt="Logo">
        <span class="site-name">WorldGuide</span>
    </nav>
</header>

<main class="register-page">

    <section class="left-side">

        <div class="register-container">

            <h1>Cadastro</h1>

            <form class="register-form">

                <label for="user">Usuário:</label>
                <input type="text" id="user" name="user">

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email">

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password">

                <label for="confirm">Confirme a sua senha:</label>
                <input type="password" id="confirm" name="confirm">

                <p class="terms">
                    Ao criar uma conta você está aceitando nossos
                    <a href="terms.html">termos de serviço e política de privacidade</a>.
                </p>

                <button class= "btn-submit" type="submit">Registrar-se</button>

                <p class="pLogin">Já tem uma conta?<a href="signIn.html">Entre</a></p>

            </form>

        </div>

    </section>

    <section class="right-side">

        <img class="hero-bkg"
             src="../assets/background/imsignUp.jpg"
             alt="Fundo">

        <img class="hero-mascot"
             src="../assets/raiMundo/raiBrasil.png"
             alt="RaiMUNDO">

    </section>

</main>

</body>

</html>
