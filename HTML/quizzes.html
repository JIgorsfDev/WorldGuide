<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quizzes</title>

    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/quizzes.css">
</head>

<body>

<header>
    <nav>
        <button class="menu-btn">
            <img src="../assets/icons/menu.png" alt="Menu">
        </button>

        <a href="home.html" class="brand">
            <img class="logo" src="../assets/icons/globe.png" alt="Logo">
            <span class="site-name">WorldGuide</span>
        </a>
    </nav>
</header>

<main class="quizzes-content">

    <div class="content">

        <section class="quizzes-section">

            <h2 class="section-title">Quizzes</h2>

            <p class="section-text">
                Teste seus conhecimentos sobre geografia, cultura e curiosidades do mundo através de nossos quizzes.
            </p>

            <div class="quiz-layout">

                <section class="daily-quiz">

                    <h3 class="dayQuiz-title">Quiz do dia</h3>

                    <div class="quiz-card">

                        <img class="mascot" src="../assets/raiMundo/raiSilvioDefault.png" alt="RaiMUNDO">

                        <div class="quiz-frame">
                            <img class="quiz-img" src="../assets/icons/game.jpg" alt="Capa do quiz">
                        </div>

                    </div>

                </section>

                <aside class="other-quizes">

                    <h3 class="rec-title">Outros quizzes</h3>

                    <ul class="rec-list">
                        <li>🌎 Desafio Mundial</li>
                        <li>🤔 Verdade ou Mito?</li>
                        <li>😵 O RaiMUNDO Disse Isso?</li>
                    </ul>

                    <img class="mascot-rec" src="../assets/raiMundo/silvioRaiLaugh.png" alt="RaiMUNDO">

                </aside>

            </div>

        </section>

    </div>

</main>

</body>

</html>
