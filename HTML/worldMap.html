<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mapa mundi</title>

    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/worldMap.css">
</head>

<body>

<header>
    <nav>
        <button class="menu-btn">
            <img src="../assets/icons/menu.png" alt="Menu">
        </button>

        <a href="home.html" class="brand">
            <img class="logo" src="../assets/icons/globe.png" alt="Logo">
            <span class="site-name">WorldGuide</span>
        </a>
    </nav>
</header>

<main class="worldmap-content">

    <div class="content">

        <section class="map-section">

            <h2 class="section-title">Mapa mundi</h2>

            <p class="section-text">
                Clique em qualquer país do mapa para descobrir mais sobre este.
            </p>

            <div class="map-wrapper">

                <div class="mascot-container">

                    <img class="mascot" src="../assets/raiMundo/raiWM.png" alt="RaiMUNDO">

                    <button class="hint-btn" aria-label="Dica do RaiMUNDO">
                        ...
                    </button>

                </div>

                <div class="map-frame">
                    <img class="map" src="../assets/icons/map.jpg" alt="Mapa mundi">
                </div>

            </div>

        </section>

    </div>

</main>

</body>

</html>
