<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jogos</title>

    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/games.css">
</head>

<body>

<header>
    <nav>
        <button class="menu-btn">
            <img src="../assets/icons/menu.png" alt="Menu">
        </button>

        <a href="home.html" class="brand">
            <img class="logo" src="../assets/icons/globe.png" alt="Logo">
            <span class="site-name">WorldGuide</span>
        </a>
    </nav>
</header>

<main class="games-content">

    <div class="content">

        <section class="games-section">

            <h2 class="section-title">Jogos</h2>

            <p class="section-text">
                Aprenda sobre geografia, cultura e curiosidades do mundo através de minijogos educativos e interativos.
            </p>

            <div class="games-layout">

                <div class="featured-game">

                    <h3 class="ftGame-title">Jogo em destaque</h3>

                    <div class="game-card">

                        <img class="mascot" src="../assets/raiMundo/raiGames.png" alt="RaiMUNDO">

                        <div class="game-frame">
                            <img class="game-img" src="../assets/icons/game.jpg" alt="Capa do jogo">
                        </div>

                    </div>

                </div>

                <aside class="recommended-games">

                    <h3 class="rec-title">Recomendações</h3>

                    <ul class="rec-list">
                        <li>🧠 Jogo da memória</li>
                        <li>🔍 Caça-países</li>
                        <li>🏛 Capitais cruzadas</li>
                        <li>🧳 Mala em viagem</li>
                        <li>🌍 Onde fica?</li>
                        <li>🧭 Explorador</li>
                    </ul>

                </aside>

            </div>

        </section>

    </div>

</main>

</body>

</html>
