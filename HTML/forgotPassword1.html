<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Esqueci a senha</title>

    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/fp1.css">
</head>

<body>

<header>
    <nav>
        <img class="logo" src="../assets/icons/globe.png" alt="Logo">
        <span class="site-name">WorldGuide</span>
    </nav>
</header>

<main class="fp1-page">

    <section class="left-side">

        <img class="hero-bkg" src="../assets/background/imFP.jpg" alt="Fundo">

        <img class="hero-mascot" src="../assets/raiMundo/raiInca.png" alt="RaiMUNDO">

    </section>

    <section class="right-side">

        <div class="fp1-container">

            <h1>Recuperar senha</h1>
            
            <form class="fp1-form">

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email">

                <button class= "btn btn-submit" type="enviar">Entrar</button>

                <p>Enviaremos um código para o seu e-mail</p>

            </form>
            
        </div>

    </section>

</main>

</html>
